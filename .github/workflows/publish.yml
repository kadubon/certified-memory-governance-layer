name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Check lockfile
        run: uv lock --check
      - name: Install dependencies
        run: uv sync --locked --dev
      - name: Verify package version
        run: uv run cmgl version
      - name: Doctor
        run: uv run cmgl doctor --skip-ledger
      - name: Build
        run: uv run python -m build
      - name: Publishability smoke
        run: uv run python scripts/check_publishability.py
      # Configure PyPI Trusted Publishing for this repository before using this workflow.
      # Do not add long-lived PyPI API tokens as repository secrets.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
