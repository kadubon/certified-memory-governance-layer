name: CI

on:
  push:
  pull_request:

jobs:
  core:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv sync --locked --dev
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Mypy
        run: uv run mypy src
      - name: Pytest
        run: uv run pytest

  release:
    runs-on: ubuntu-latest
    needs: core
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install all release dependencies
        run: uv sync --locked --all-extras --dev
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Mypy
        run: uv run mypy src
      - name: Coverage
        run: uv run pytest --cov=cmgl
      - name: Local doctor
        run: uv run cmgl doctor --skip-ledger
      - name: Adapter doctor
        run: uv run cmgl adapters doctor
      - name: Adapter live smoke contract
        run: uv run cmgl adapters live-smoke --target all --dry-run
      - name: Canonical validation
        run: uv run cmgl validate canonical
      - name: Schema export
        run: uv run cmgl schema export /tmp/cmgl-schemas
      - name: Strict conformance fixture
        run: uv run cmgl validate ledger examples/conformance/strict_ledger.valid.jsonl
      - name: Telemetry replay fixture
        run: uv run cmgl telemetry replay examples/conformance/telemetry_replay.valid.jsonl --profile strict --json
      - name: Examples
        run: |
          uv run python examples/governance_layer_demo.py
          uv run python examples/strict_authority_demo.py
          uv run python examples/ledger_receipt_demo.py
      - name: Build package
        run: uv run python -m build
      - name: Publishability smoke check
        run: uv run python scripts/check_publishability.py
      - name: Pip audit
        run: uv run pip-audit
