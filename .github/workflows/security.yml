name: Security

on:
  push:
  pull_request:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv sync --locked --dev
      - name: pip-audit
        run: uv run pip-audit
      - name: High-confidence secret guard
        run: uv run python scripts/check_publishability.py --secret-scan-only
